<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2><span class="text-warning"> B</span>ook <span class="text-warning">N</span>est</h2>
                <p>Sign in to continue your reading journey</p>
            </div>

            <form method="post" class="auth-form">
                {% csrf_token %}

                {% if form.errors %}
                <div class="alert alert-error">
                    <p>Your username and password didn't match. Please try again.</p>
                </div>
                {% endif %}

                <div class="form-group">
                    <label for="id_username">Username</label>
                    <input type="text" name="username" id="id_username" class="form-control" required autofocus>
                </div>

                <div class="form-group">
                    <label for="id_password">Password</label>
                    <input type="password" name="password" id="id_password" class="form-control" required>
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" name="remember">
                        <span>Remember me</span>
                    </label>
                    <a href="{% url 'password_reset' %}" class="forgot-link">
                        Forgot Password?
                    </a>
                </div>

                <button type="submit" class="btn-primary btn-full">
                    Sign In
                </button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account?
                    <a href="{% url 'register' %}" class="auth-link">Sign Up</a>
                </p>
            </div>
        </div>
    </div>

    <style>
        .auth-container {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f5f0e8 0%, #e8e0d4 100%);
            padding: 40px 20px;
        }

        .auth-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 100%;
            max-width: 450px;
            transition: transform 0.3s ease;
        }

        .auth-card:hover {
            transform: translateY(-4px);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            color: #1a1714;
            margin-bottom: 8px;
        }

        .auth-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: #c49c55;
            box-shadow: 0 0 0 3px rgba(196, 156, 85, 0.1);
        }

        .alert-error {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #666;
        }

        .forgot-link {
            color: #c49c55;
            text-decoration: none;
            transition: color 0.2s;
        }

        .forgot-link:hover {
            color: #a67c3a;
            text-decoration: underline;
        }

        .btn-primary {
            background: #c49c55;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background: #a67c3a;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(196, 156, 85, 0.3);
        }

        .btn-full {
            width: 100%;
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #eee;
        }

        .auth-footer p {
            color: #666;
            font-size: 14px;
        }

        .auth-link {
            color: #c49c55;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 24px;
            }

            .auth-header h2 {
                font-size: 24px;
            }
        }
    </style>
</body>

</html>
