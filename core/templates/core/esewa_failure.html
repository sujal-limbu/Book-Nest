{% extends "base.html" %}
{% block content %}

<div class="container my-5 text-center">
    <div class="card shadow-sm border-0 rounded-4 p-5 mx-auto" style="max-width: 500px;">
        
        <div style="font-size: 4rem;">❌</div>
        <h3 class="fw-bold mt-3 text-danger">Payment Failed!</h3>
        <p class="text-muted mt-2">Something went wrong with your payment. Please try again.</p>

        <div class="alert alert-danger mt-3">
            <strong>Possible reasons:</strong>
            <ul class="text-start mt-2 mb-0">
                <li>Incorrect eSewa credentials</li>
                <li>Insufficient balance</li>
                <li>Transaction was cancelled</li>
                <li>Network issue</li>
            </ul>
        </div>

        <div class="d-flex gap-3 justify-content-center mt-4">
            <a href="{% url 'cart' %}" class="btn btn-danger rounded-pill px-4">
                🔄 Try Again
            </a>
            <a href="{% url 'index' %}" class="btn btn-outline-secondary rounded-pill px-4">
                🏠 Go Home
            </a>
        </div>

    </div>
</div>

{% endblock %}
