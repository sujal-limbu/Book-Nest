{% extends "base.html" %}
{% load static %}
{% block content %}

<!-- Header -->
<div class="bg-primary text-white text-center py-4">
    <h1 class="fw-bold">Contact Us</h1>
    <p class="mb-0">We're happy to help you!</p>
</div>

<div class="container my-5">
    <div class="row g-4">
        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-success alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
        {% endif %}

        <!-- Left: Contact Info -->
        

        

        <!-- Right: Contact Form -->
        <div class="col-md-12">
            <div class="card shadow-sm h-100">
                <div class="card-body p-4">
                    <h4 class="fw-bold mb-4">Send Us a Message</h4>
                    <form method="POST">
                        {% csrf_token %}
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Full Name</label>
                                <input type="text" name="name" class="form-control" placeholder="Your name" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Phone Number</label>
                                <input type="tel" name="phone" class="form-control" placeholder="+977 98XXXXXXXX">
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">Email</label>
                                <input type="email" name="email" class="form-control" placeholder="your@email.com"
                                    required>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">Subject</label>
                                <input type="text" name="subject" class="form-control" placeholder="How can we help?">
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">Message</label>
                                <textarea name="message" class="form-control" rows="5"
                                    placeholder="Write your message here..." required></textarea>
                            </div>
                            <div class="col-12">
                                <button type="submit" class="btn btn-primary px-5 rounded-pill">
                                    Send Message
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>

    </div>

    <!-- Google Map -->
    <div class="mt-5">
        <h5 class="fw-bold mb-3">📌 Find Us Here</h5>
        <div class="ratio ratio-21x9">
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3532.6!2d85.3240!3d27.6939!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2sBuddhanagar%2C%20New%20Baneswor%2C%20Kathmandu!5e0!3m2!1sen!2snp!4v1"
                style="border:0; border-radius: 10px;" allowfullscreen="" loading="lazy">
            </iframe>
        </div>
    </div>

</div>

{% endblock content %}
