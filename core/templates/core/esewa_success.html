{% extends "base.html" %}
{% block content %}

<div class="container my-5 text-center">
    <div class="card shadow-sm border-0 rounded-4 p-5 mx-auto" style="max-width: 500px;">
        <div style="font-size: 4rem;">✅</div>
        <h3 class="fw-bold mt-3 text-success">Payment Successful!</h3>
        <p class="text-muted mt-2">Thank you for your order. Your books are on the way!</p>

        <div class="alert alert-success mt-3">
            <strong>Order #{{ order.id }}</strong><br>
            Amount Paid: <strong>NPR {{ order.total_amount }}</strong>
        </div>

        <a href="{% url 'index' %}" class="btn btn-primary rounded-pill px-5 mt-3">
            Continue Shopping
        </a>
    </div>
</div>

{% endblock %}
